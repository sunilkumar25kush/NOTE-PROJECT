<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-create {
            background: #667eea;
            color: white;
        }

        .btn-create:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-clear {
            background: #e0e0e0;
            color: #333;
        }

        .btn-clear:hover {
            background: #d0d0d0;
        }

        .notes-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .notes-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .no-notes {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .note-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .note-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }

        .note-card h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .note-card p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .note-id {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .note-actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
        }

        .btn-edit:hover {
            background: #45a049;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
        }

        .close {
            float: right;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Notes App</h1>

        <div class="form-section">
            <h2>Create New Note</h2>
            <div id="alert-create"></div>
            <div class="form-group">
                <label for="noteTitle">Title:</label>
                <input type="text" id="noteTitle" placeholder="Enter note title">
            </div>
            <div class="form-group">
                <label for="noteDescription">Description:</label>
                <textarea id="noteDescription" placeholder="Enter note description"></textarea>
            </div>
            <div class="button-group">
                <button class="btn-create" onclick="createNote()">Create Note</button>
                <button class="btn-clear" onclick="clearForm()">Clear</button>
            </div>
        </div>

        <div class="notes-section">
            <h2>All Notes</h2>
            <div id="alert-fetch"></div>
            <div id="notesList"></div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <div class="modal-header">Update Note</div>
            <div id="alert-edit"></div>
            <div class="form-group">
                <label for="editTitle">Title:</label>
                <input type="text" id="editTitle" disabled>
            </div>
            <div class="form-group">
                <label for="editDescription">Description:</label>
                <textarea id="editDescription"></textarea>
            </div>
            <div class="button-group">
                <button class="btn-create" onclick="updateNote()">Update Note</button>
                <button class="btn-clear" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let editingNoteId = null;

        // Create Note
        async function createNote() {
            const title = document.getElementById('noteTitle').value;
            const description = document.getElementById('noteDescription').value;

            if (!title || !description) {
                showAlert('alert-create', 'Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/notes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        description: description
                    })
                });

                if (response.ok) {
                    showAlert('alert-create', '✅ Note created successfully!', 'success');
                    clearForm();
                    setTimeout(fetchNotes, 1000);
                } else {
                    showAlert('alert-create', '❌ Failed to create note', 'error');
                }
            } catch (error) {
                showAlert('alert-create', '❌ Error: ' + error.message, 'error');
            }
        }

        // Fetch All Notes
        async function fetchNotes() {
            const notesList = document.getElementById('notesList');
            notesList.innerHTML = '<div class="loading">Loading notes...</div>';

            try {
                const response = await fetch(`${API_BASE}/notes`);
                const data = await response.json();

                if (data.notes && data.notes.length > 0) {
                    notesList.innerHTML = data.notes.map(note => `
                        <div class="note-card">
                            <div class="note-id">ID: ${note._id}</div>
                            <h3>${escapeHtml(note.title)}</h3>
                            <p>${escapeHtml(note.description)}</p>
                            <div class="note-actions">
                                <button class="btn-edit" onclick="openEditModal('${note._id}', '${escapeHtml(note.title)}', '${escapeHtml(note.description)}')">Edit</button>
                                <button class="btn-delete" onclick="deleteNote('${note._id}')">Delete</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    notesList.innerHTML = '<div class="no-notes">No notes yet. Create one to get started!</div>';
                }
            } catch (error) {
                notesList.innerHTML = `<div class="alert alert-error">Error loading notes: ${error.message}</div>`;
            }
        }

        // Delete Note
        async function deleteNote(id) {
            if (!confirm('Are you sure you want to delete this note?')) return;

            try {
                const response = await fetch(`${API_BASE}/notes/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert('alert-fetch', '✅ Note deleted successfully!', 'success');
                    setTimeout(fetchNotes, 1000);
                } else {
                    showAlert('alert-fetch', '❌ Failed to delete note', 'error');
                }
            } catch (error) {
                showAlert('alert-fetch', '❌ Error: ' + error.message, 'error');
            }
        }

        // Edit Modal Functions
        function openEditModal(id, title, description) {
            editingNoteId = id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editDescription').value = description;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingNoteId = null;
        }

        // Update Note
        async function updateNote() {
            const description = document.getElementById('editDescription').value;

            if (!description) {
                showAlert('alert-edit', 'Description cannot be empty', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/notes/${editingNoteId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        description: description
                    })
                });

                if (response.ok) {
                    showAlert('alert-edit', '✅ Note updated successfully!', 'success');
                    setTimeout(() => {
                        closeEditModal();
                        fetchNotes();
                    }, 1000);
                } else {
                    showAlert('alert-edit', '❌ Failed to update note', 'error');
                }
            } catch (error) {
                showAlert('alert-edit', '❌ Error: ' + error.message, 'error');
            }
        }

        // Helper Functions
        function clearForm() {
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteDescription').value = '';
        }

        function showAlert(elementId, message, type) {
            const alertDiv = document.getElementById(elementId);
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 5000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load notes on page load
        window.addEventListener('load', fetchNotes);

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
